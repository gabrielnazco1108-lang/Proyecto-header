<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNITEC Marketplace | Proyecto Final</title>
    <!-- Vinculación del archivo de estilos externo -->
    <link rel="stylesheet" href="tienda.css">
</head>
<body>

    <!-- HEADER / ZONA DE BÚSQUEDA Y NAVEGACIÓN -->
    <header class="main-header">
        <div class="header-container">
            <!-- Logo de la tienda -->
            <div class="logo">
                <h1>UNITEC<span>Market</span></h1>
            </div>
            
            <!-- Barra de búsqueda en tiempo real -->
            <div class="search-box">
                <input type="text" id="search-input" placeholder="¿Qué estás buscando hoy?">
            </div>

            <!-- Botón del Carrito con Contador dinámico -->
            <div class="cart-icon-container" id="cart-toggle">
                <button class="cart-btn">
                    🛒 Carrito <span id="cart-count">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">
        <h2 class="section-title">Productos Destacados</h2>
        
        <!-- Grid de productos (Se renderiza dinámicamente o estático) -->
        <section class="products-grid" id="products-container">
            <!-- Producto 1 -->
            <article class="product-card" data-name="laptop gamer asus">
                <div class="product-img-placeholder">💻</div>
                <div class="product-info">
                    <h3>Laptop Gamer ASUS</h3>
                    <p class="price">$1,200</p>
                    <button class="add-to-cart-btn" data-id="1" data-name="Laptop Gamer ASUS" data-price="1200">Añadir al carrito</button>
                </div>
            </article>

            <!-- Producto 2 -->
            <article class="product-card" data-name="audifonos inalambricos sony">
                <div class="product-img-placeholder">🎧</div>
                <div class="product-info">
                    <h3>Audífonos Inalámbricos Sony</h3>
                    <p class="price">$250</p>
                    <button class="add-to-cart-btn" data-id="2" data-name="Audífonos Inalámbricos Sony" data-price="250">Añadir al carrito</button>
                </div>
            </article>

            <!-- Producto 3 -->
            <article class="product-card" data-name="smartwatch samsung galaxy">
                <div class="product-img-placeholder">⌚</div>
                <div class="product-info">
                    <h3>Smartwatch Samsung Galaxy</h3>
                    <p class="price">$300</p>
                    <button class="add-to-cart-btn" data-id="3" data-name="Smartwatch Samsung Galaxy" data-price="300">Añadir al carrito</button>
                </div>
            </article>

            <!-- Producto 4 -->
            <article class="product-card" data-name="teclado mecanico rgb">
                <div class="product-img-placeholder">⌨️</div>
                <div class="product-info">
                    <h3>Teclado Mecánico RGB</h3>
                    <p class="price">$95</p>
                    <button class="add-to-cart-btn" data-id="4" data-name="Teclado Mecánico RGB" data-price="95">Añadir al carrito</button>
                </div>
            </article>
        </section>
    </main>

    <!-- SECCIÓN LATERAL DEL CARRITO (OCULTA POR DEFECTO) -->
    <aside class="cart-sidebar" id="cart-sidebar">
        <div class="cart-sidebar-header">
            <h3>Tu Carrito</h3>
            <button id="close-cart" class="close-btn">&times;</button>
        </div>
        <!-- Lista de productos agregados -->
        <div class="cart-items-container" id="cart-items">
            <!-- JS agregará los elementos aquí -->
            <p class="empty-cart-msg">El carrito está vacío.</p>
        </div>
        <!-- Total y Acción -->
        <div class="cart-footer">
            <div class="total-container">
                <span>Total:</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button id="checkout-btn" class="checkout-btn">Finalizar Compra</button>
        </div>
    </aside>

    <!-- FOOTER -->
    <footer class="main-footer">
        <p>&copy; 2026 UNITEC Guacara - Proyecto Final de Programación I.</p>
    </footer>

    <!-- Vinculación del archivo de lógica de interacción -->
    <script src="tienda.js"></script>
</body>
                              </html>
